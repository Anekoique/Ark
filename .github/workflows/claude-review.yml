name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR for code quality, potential bugs, security issues, and Rust best practices.
            Focus on:
            - Correctness and edge cases
            - Error handling (prefer crate::error::Result over panics/unwrap)
            - Filesystem safety (prefer io::PathExt over std::fs::*)
            - Adherence to conventions in AGENTS.md
            Provide constructive, actionable feedback. Skip trivial style nits already enforced by rustfmt/clippy.
